name: Build Google Play Release (AAB)

on:
  workflow_dispatch:  # Manual trigger from GitHub Actions tab
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java (required for Android build)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android AAB (local)
        # We use the 'production' profile which is set to 'app-bundle' in eas.json
        run: npx eas-cli build --platform android --profile production --local --non-interactive --output ./release.aab
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: yourbooks-pos-release
          path: ./release.aab
          retention-days: 30
